name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # build artifacts on demand (no release)

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            extras: "server,audio,asr,desktop,package"
          - os: macos-13 # Intel
            target: macos-intel
            extras: "server,audio,asr,desktop,package"
          - os: macos-14 # Apple Silicon
            target: macos-arm64
            extras: "server,audio,asr,mlx,desktop,package"
          - os: ubuntu-latest # server + browser/kiosk (no native window)
            target: linux-x64
            extras: "server,audio,asr,package"
    steps:
      - uses: actions/checkout@v4

      # Build the shared frontend the desktop server serves.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @captions/display build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install desktop + packaging deps
        run: python -m pip install -e "./desktop[${{ matrix.extras }}]"

      - name: Build bundle + zip
        run: python desktop/packaging/build.py --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: live-captions-${{ matrix.target }}
          path: desktop/dist/live-captions-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
