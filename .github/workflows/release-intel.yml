name: release-intel

# macOS Intel is split out because macos-13 (Intel) runners are scarce/being
# deprecated and were blocking the main release. Tag `vX.Y.Z-intel` to build +
# publish the Intel bundle to its own release, on its own schedule.
on:
  push:
    tags: ["v*-intel"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build macos-intel
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @captions/display build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install desktop + packaging deps
        run: python -m pip install -e "./desktop[server,audio,asr,desktop,package]"

      - name: Build bundle + zip
        run: python desktop/packaging/build.py --target macos-intel

      - uses: actions/upload-artifact@v4
        with:
          name: caption-guru-macos-intel
          path: desktop/dist/caption-guru-macos-intel.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          # A prerelease marker before `-intel` (e.g. v0.2.0-beta-intel) → prerelease.
          # Plain `vX.Y.Z-intel` stays a full release (matching the main tag).
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
